<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<style>

/* BODY */

body{
margin:0;
font-family:serif;
background:linear-gradient(#2b0000,#050505);
color:#f5d27a;
text-align:center;
}

/* INTRO */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#3b0000,#000);
color:#ffd700;
font-size:52px;
letter-spacing:5px;
text-shadow:0 0 25px #b8860b;
}

/* MAIN */

#main{
display:none;
padding:40px;
}

/* TITLE */

h1{
color:#ffd700;
text-shadow:0 0 20px #b8860b;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:45px;
font-size:18px;
}

/* BOX CONTAINER */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

/* FEATURE BOX */

.box{
width:220px;
height:120px;
background:#3b0000;
border:2px solid #d4af37;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(212,175,55,0.4);
}

.box:hover{
background:#d4af37;
color:#3b0000;
transform:scale(1.06);
box-shadow:0 0 20px #d4af37;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
ASTROVEDA
</div>

<!-- MAIN DASHBOARD -->

<div id="main">

<h1>ASTROVEDA</h1>

<div class="subtitle">
Vedic Astrology Platform
</div>

<div class="container">

<div class="box">Kundali</div>

<div class="box">Panchanga</div>

<div class="box">Gochara</div>

<div class="box">Dasha Timeline</div>

<div class="box">Nakshatra</div>

<div class="box">Navamsa</div>

</div>

</div>

<script>

/* INTRO → DASHBOARD */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="block"
},2000)

</script>

</body>
</html>
