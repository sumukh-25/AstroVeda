<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<style>

/* BODY */

body{
margin:0;
font-family:serif;
background:linear-gradient(#2b0000,#050505);
color:#f5d27a;
text-align:center;
}

/* INTRO */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#3b0000,#000);
color:#ffd700;
font-size:52px;
letter-spacing:4px;
text-shadow:0 0 25px #b8860b;
}

/* MAIN PAGE */

#main{
display:none;
padding-top:40px;
}

/* TITLE */

h1{
font-size:42px;
color:#ffd700;
text-shadow:0 0 20px #b8860b;
margin-bottom:50px;
}

/* GRID LAYOUT */

.grid{
display:grid;
grid-template-columns:180px 180px 180px;
grid-template-rows:140px 140px 140px;
justify-content:center;
align-items:center;
gap:20px;
}

/* BOX STYLE */

.box{
background:#3b0000;
border:2px solid #d4af37;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(212,175,55,0.4);
}

.box:hover{
background:#d4af37;
color:#3b0000;
transform:scale(1.06);
box-shadow:0 0 20px #d4af37;
}

/* POSITIONS */

.kundali{grid-column:1;grid-row:1;}
.panchanga{grid-column:3;grid-row:1;}
.month{grid-column:2;grid-row:2;}
.transit{grid-column:1;grid-row:3;}
.dasha{grid-column:3;grid-row:3;}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
AstroVeda
</div>

<!-- MAIN DASHBOARD -->

<div id="main">

<h1>AstroVeda</h1>

<div class="grid">

<div class="box kundali">Kundali</div>

<div class="box panchanga">Panchanga</div>

<div class="box month">Month View</div>

<div class="box transit">Transit (Gochara)</div>

<div class="box dasha">Dasha</div>

</div>

</div>

<script>

/* INTRO TO DASHBOARD */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
},2000)

</script>

</body>
</html>
