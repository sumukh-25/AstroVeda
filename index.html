<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
background:#0B0F2F;
color:#F8F5E4;
font-family:"Cormorant Garamond",serif;
overflow:hidden;
}

/* ===== STARS ===== */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:60px 60px;
opacity:.25;
animation:stars 90s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-600px)}
}

/* ===== SOLAR SYSTEM INTRO ===== */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.sun{
width:120px;
height:120px;
background:#D4AF37;
border-radius:50%;
box-shadow:0 0 40px #D4AF37;
position:relative;
}

.orbit{
position:absolute;
border:1px solid rgba(255,255,255,.2);
border-radius:50%;
}

.planet{
width:14px;
height:14px;
background:white;
border-radius:50%;
position:absolute;
top:-7px;
left:50%;
transform:translateX(-50%);
}

.orbit1{
width:180px;
height:180px;
animation:spin 10s linear infinite;
}

.orbit2{
width:260px;
height:260px;
animation:spin 18s linear infinite;
}

.orbit3{
width:340px;
height:340px;
animation:spin 26s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* ===== TEMPLE DOORS ===== */

#doors{
position:fixed;
top:0;
width:100%;
height:100%;
display:flex;
z-index:10;
}

.door{
width:50%;
background:#8B0000;
border:3px solid #D4AF37;
transition:transform 2s ease;
}

.left{transform-origin:left;}
.right{transform-origin:right;}

.open .left{
transform:rotateY(-90deg);
}

.open .right{
transform:rotateY(90deg);
}

/* ===== BIRTH FORM ===== */

#form{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:"Cinzel",serif;
}

input{
margin:10px;
padding:10px;
font-size:18px;
border:1px solid gold;
background:#F5E6C8;
}

button{
padding:10px 20px;
font-size:18px;
background:#D4AF37;
border:none;
cursor:pointer;
}

/* ===== KUNDALI ===== */

#kundali{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.chart{
width:320px;
height:320px;
border:3px solid gold;
transform:rotate(45deg);
position:relative;
}

.house{
position:absolute;
border:1px solid gold;
width:50%;
height:50%;
}

.house1{top:0;left:0}
.house2{top:0;right:0}
.house3{bottom:0;left:0}
.house4{bottom:0;right:0}

/* planets */

.planetIcon{
position:absolute;
font-size:18px;
animation:planetMove 12s linear infinite;
filter:drop-shadow(0 0 10px gold);
}

@keyframes planetMove{
0%{transform:translate(0,0)}
50%{transform:translate(5px,5px)}
100%{transform:translate(0,0)}
}

</style>
</head>

<body>

<!-- SOLAR SYSTEM INTRO -->

<div id="intro">

<div class="sun">

<div class="orbit orbit1">
<div class="planet"></div>
</div>

<div class="orbit orbit2">
<div class="planet"></div>
</div>

<div class="orbit orbit3">
<div class="planet"></div>
</div>

</div>

</div>

<!-- TEMPLE DOORS -->

<div id="doors">
<div class="door left"></div>
<div class="door right"></div>
</div>

<!-- BIRTH DETAILS -->

<div id="form">

<h1>Enter Birth Details</h1>

<input type="date">
<input type="time">
<input type="text" placeholder="Birth Place">

<button onclick="showKundali()">Generate Kundali</button>

</div>

<!-- KUNDALI -->

<div id="kundali">

<h1>AstroVeda Kundali</h1>

<div class="chart">

<div class="house house1"></div>
<div class="house house2"></div>
<div class="house house3"></div>
<div class="house house4"></div>

<div class="planetIcon" style="top:20px;left:20px;">☉</div>
<div class="planetIcon" style="top:80px;left:120px;">☽</div>
<div class="planetIcon" style="top:200px;left:40px;">♂</div>
<div class="planetIcon" style="top:180px;left:200px;">♃</div>

</div>

</div>

<script>

/* solar intro */

setTimeout(()=>{
document.getElementById("doors").classList.add("open")
},2500)

/* show form */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("form").style.display="flex"
},4500)

/* kundali */

function showKundali(){

document.getElementById("form").style.display="none"
document.getElementById("kundali").style.display="flex"

}

</script>

</body>
</html>
