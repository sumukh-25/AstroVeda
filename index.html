<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroVeda - Divine South Indian Astrology</title>
  <style>
    @import url('[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Sree+Krushnadevaraya&display=swap)');

    body {
      margin: 0;
      background: radial-gradient(circle at center, #2b1b00 60%, #000);
      font-family: 'Sree Krushnadevaraya', serif;
      color: #ffd700;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 30px 10px;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #ffcc33;
      text-shadow: 0 0 10px #ffea96, 0 0 30px #b8860b;
    }

    .mandala {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 50px auto;
      border-radius: 50%;
      border: 2px solid rgba(255, 204, 100, 0.5);
      box-shadow: 0 0 30px rgba(255, 200, 100, 0.3);
      animation: rotate 80s linear infinite;
    }

    .planet {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff5c0, #ffb400);
      box-shadow: 0 0 20px rgba(255, 200, 100, 0.8);
      text-align: center;
      line-height: 80px;
      font-size: 1rem;
      font-weight: bold;
    }

    /* Navagraha orbit positioning */
    .planet:nth-child(1) { top: 0; left: 160px; }
    .planet:nth-child(2) { top: 40px; right: 0; }
    .planet:nth-child(3) { bottom: 0; right: 160px; }
    .planet:nth-child(4) { bottom: 40px; left: 0; }
    .planet:nth-child(5) { top: 160px; left: 0; }
    .planet:nth-child(6) { top: 0; right: 160px; }
    .planet:nth-child(7) { bottom: 160px; right: 0; }
    .planet:nth-child(8) { bottom: 0; left: 160px; }
    .planet:nth-child(9) { top: 160px; right: 0; }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 30px 10px;
      color: #ffdd99;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    .temple-border {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: repeating-linear-gradient(
        to right,
        #c2a13d 0,
        #d4b65e 10px,
        #6b4e0d 20px
      );
      box-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    .intro {
      text-align: center;
      max-width: 700px;
      margin: 20px auto;
      font-size: 1.3rem;
      line-height: 2rem;
      color: #ffe7a1;
      text-shadow: 0 0 5px #a97b2e;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <div class="temple-border"></div>
  <header>🪔 AstroVeda 🪔</header>

  <div class="intro">
    Discover the sacred science of <strong>South Indian Astrology</strong> — rooted in Vedic wisdom,
    guided by the Navagrahas, and infused with divine insight.
  </div>

  <div class="mandala">
    <div class="planet">☉ Surya</div>
    <div class="planet">☾ Chandra</div>
    <div class="planet">♂ Mangala</div>
    <div class="planet">☿ Budha</div>
    <div class="planet">♃ Guru</div>
    <div class="planet">♀ Shukra</div>
    <div class="planet">♄ Shani</div>
    <div class="planet">☊ Rahu</div>
    <div class="planet">☋ Ketu</div>
  </div>

  <footer>🕉️ Om Namo Narayanaya | AstroVeda - Divine South Indian Astrology 🕉️</footer>

</body>
</html>
