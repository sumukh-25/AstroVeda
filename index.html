<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body{
margin:0;
background:linear-gradient(180deg,#0B0F2F,#121A4A,#0B0F2F);
color:#F8F5E4;
font-family:"Cormorant Garamond",serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* subtle cosmic movement */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;

background-image:
radial-gradient(white 3px, transparent 4px),
radial-gradient(rgba(212,175,55,.7) 3px, transparent 3px);

background-size:80px 80px,140px 140px;
opacity:.30;

animation:spaceMove 90s linear infinite;
}

@keyframes spaceMove{
from{transform:translate(0,0)}
to{transform:translate(-200px,-300px)}
}

 #constellation{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
  
/* ===== FRAME ===== */

#frame{
width:92%;
height:92%;
border-radius:10px;

display:flex;
justify-content:center;
align-items:center;
padding-top:40px
position:relative;
}

/* ===== INTRO ===== */

#intro{
position:absolute;
display:flex;
justify-content:center;
align-items:center;
font-family:"Cinzel",serif;
font-size:60px;
color:#D4AF37;
}

/* SUN O */

.sunO{

display:inline-block;

width:38px;
height:38px;

border-radius:50%;

background:#D4AF37;

margin:0 6px;

box-shadow:
0 0 15px gold,
0 0 35px gold,
0 0 55px rgba(212,175,55,.6);

animation:sunPulse 4s ease-in-out infinite;

}

@keyframes sunPulse{

0%{
box-shadow:
0 0 10px gold,
0 0 25px gold;
}

50%{
box-shadow:
0 0 25px gold,
0 0 55px gold;
}

100%{
box-shadow:
0 0 10px gold,
0 0 25px gold;
}

}

/* ===== MAIN ===== */

#main{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

/* TITLE */

h1{
font-family:"Cinzel",serif;
font-size:42px;
color:#D4AF37;
margin-bottom:5px;

text-shadow:
0 0 10px #D4AF37,
0 0 30px rgba(212,175,55,0.6);
}

/* SUBTITLE */

.subtitle{
font-size:18px;
opacity:.9;
margin-bottom:20px;
}

/* DIVIDER */

.divider{
color:#D4AF37;
font-size:8px;
letter-spacing:1px;
margin-bottom:30px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:200px 200px 200px;
grid-template-rows:140px 140px 140px;
gap:25px;
}

/* BOXES */

.box{
background:#F5E6C8;
color:#0B0F2F;

border:2px solid #D4AF37;
border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-family:"Cinzel",serif;
font-size:20px;

cursor:pointer;

box-shadow:0 0 12px rgba(212,175,55,0.5);

transition:.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

/* POSITIONS */

.month{grid-column:1;grid-row:1;}
.panchanga{grid-column:3;grid-row:1;}

.kundali{grid-column:2;grid-row:2;}

.transit{grid-column:1;grid-row:3;}
.dasha{grid-column:3;grid-row:3;}

</style>
</head>

<body>
<canvas id="constellation"></canvas>

<div id="frame">

<!-- INTRO -->

<div id="intro">

ASTR<span class="sunO"></span>VEDA

</div>

<!-- MAIN PAGE -->

<div id="main">
<h1>AstroVeda</h1>
<div class="subtitle">
Vedic Astrology Platform
</div>
<div class="divider">
✦ ───────── ☉ ───────── ✦
</div>

<div class="grid">

<div class="box month">Month View</div>
<div class="box panchanga">Panchanga</div>

<div class="box kundali">Kundali</div>

<div class="box transit">Transit</div>
<div class="box dasha">Dasha</div>

</div>

</div>

</div>

<script>

/* INTRO → MAIN */

setTimeout(()=>{

document.getElementById("frame").style.border="2px solid #D4AF37"
document.getElementById("frame").style.boxShadow="0 0 25px rgba(212,175,55,0.6)"

document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="flex"

},3000)

</script>
<script>

const canvas = document.getElementById("constellation");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let starCount = 60;

for(let i=0;i<starCount;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.1,
vy:(Math.random()-0.5)*0.1
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<stars.length;i++){

let s=stars[i];

s.x+=s.vx;
s.y+=s.vy;

if(s.x<0||s.x>canvas.width)s.vx*=-1;
if(s.y<0||s.y>canvas.height)s.vy*=-1;

ctx.beginPath();
ctx.arc(s.x,s.y,1.5,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.fill();

for(let j=i+1;j<stars.length;j++){

let s2=stars[j];
let dx=s.x-s2.x;
let dy=s.y-s2.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s2.x,s2.y);
ctx.strokeStyle="rgba(212,175,55,"+(1-dist/120)+")";
ctx.lineWidth=0.3;
ctx.stroke();

}

}

}

requestAnimationFrame(draw);

}

draw();

</script>
</body>
</html>
