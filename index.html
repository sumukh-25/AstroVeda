<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body{
margin:0;
background:linear-gradient(180deg,#10154A,#1A2370,#10154A);
color:#F8F5E4;
font-family:"Cormorant Garamond",serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* ===== RANDOM TWINKLING STARS ===== */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
pointer-events:none;

background-image:
radial-gradient(rgba(255,255,255,.9) 2px, transparent 3px),
radial-gradient(rgba(212,175,55,.8) 2px, transparent 3px);

background-size:180px 220px,260px 300px;

opacity:.35;

animation:twinkle 6s ease-in-out infinite alternate;
}

@keyframes twinkle{
0%{opacity:.25;}
100%{opacity:.45;}
}

/* ===== FRAME ===== */

#frame{
width:92%;
height:90%;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:70px;
position:relative;
}

/* ===== VERTICAL GOLD LINES ===== */

#frame::before,
#frame::after{

content:"";
position:absolute;
top:0;
bottom:0;
width:2px;
background:#D4AF37;

box-shadow:0 0 15px gold;

animation:borderPulse 4s ease-in-out infinite;

}

#frame::before{left:0;}
#frame::after{right:0;}

@keyframes borderPulse{

0%{opacity:.5;box-shadow:0 0 8px gold;}
50%{opacity:1;box-shadow:0 0 22px gold;}
100%{opacity:.5;box-shadow:0 0 8px gold;}

}

/* ===== INTRO ===== */

#intro{
position:absolute;
display:flex;
justify-content:center;
align-items:center;
font-family:"Cinzel",serif;
font-size:60px;
color:#D4AF37;
}

/* SUN O */

.sunO{

display:inline-block;

width:38px;
height:38px;

border-radius:50%;

background:#D4AF37;

margin:0 6px;

box-shadow:
0 0 15px gold,
0 0 35px gold,
0 0 55px rgba(212,175,55,.6);

animation:sunPulse 4s ease-in-out infinite;

}

@keyframes sunPulse{

0%{
box-shadow:0 0 10px gold,0 0 25px gold;
}

50%{
box-shadow:0 0 25px gold,0 0 55px gold;
}

100%{
box-shadow:0 0 10px gold,0 0 25px gold;
}

}

/* ===== MAIN ===== */

#main{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

/* TITLE */

h1{
font-family:"Cinzel",serif;
font-size:44px;
color:#D4AF37;
margin-bottom:6px;

text-shadow:
0 0 10px #D4AF37,
0 0 30px rgba(212,175,55,0.7);
}

/* SUBTITLE */

.subtitle{
font-size:18px;
opacity:.9;
margin-bottom:28px;
}

/* ===== ELEGANT DIVIDER ===== */

.divider{

width:260px;
height:1px;

background:linear-gradient(
90deg,
transparent,
#D4AF37,
#D4AF37,
transparent
);

position:relative;

margin-bottom:40px;

box-shadow:0 0 10px rgba(212,175,55,.8);

}

.divider::after{

content:"☉";
position:absolute;

top:-13px;
left:50%;
transform:translateX(-50%);

color:#D4AF37;
font-size:18px;

text-shadow:0 0 10px gold;

}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:200px 200px 200px;
grid-template-rows:140px 140px 140px;
gap:25px;
}

/* ===== BOXES ===== */

.box{
background:#F5E6C8;
color:#0B0F2F;

border:2px solid #D4AF37;
border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-family:"Cinzel",serif;
font-size:20px;

cursor:pointer;

box-shadow:0 0 12px rgba(212,175,55,0.5);

transition:.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

/* POSITIONS */

.month{grid-column:1;grid-row:1;}
.panchanga{grid-column:3;grid-row:1;}

.kundali{grid-column:2;grid-row:2;}

.transit{grid-column:1;grid-row:3;}
.dasha{grid-column:3;grid-row:3;}

</style>
</head>

<body>

<div id="frame">

<!-- INTRO -->

<div id="intro">

ASTR<span class="sunO"></span>VEDA

</div>

<!-- MAIN PAGE -->

<div id="main">

<h1>AstroVeda</h1>

<div class="subtitle">
Vedic Astrology Platform
</div>

<div class="divider"></div>

<div class="grid">

<div class="box month">Month View</div>
<div class="box panchanga">Panchanga</div>

<div class="box kundali">Kundali</div>

<div class="box transit">Transit</div>
<div class="box dasha">Dasha</div>

</div>

</div>

</div>

<script>

setTimeout(()=>{

document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="flex"

},3000)

</script>

</body>
</html>
