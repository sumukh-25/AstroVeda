<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<style>

/* ---------------- BODY ---------------- */

body{
margin:0;
font-family:serif;
background:linear-gradient(#2b0000,#070707);
color:#f5d27a;
text-align:center;
}

/* ---------------- INTRO ---------------- */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#3b0000,#000);
color:#ffd700;
font-size:50px;
letter-spacing:4px;
}

/* ---------------- MAIN ---------------- */

#main{
display:none;
padding:30px;
}

/* ---------------- TITLE ---------------- */

h1{
color:#ffd700;
text-shadow:0 0 15px #b8860b;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

/* ---------------- BOX CONTAINER ---------------- */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

/* ---------------- FEATURE BOX ---------------- */

.box{
width:220px;
height:120px;
background:#3b0000;
border:2px solid #d4af37;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

.box:hover{
background:#d4af37;
color:#3b0000;
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- INTRO SCREEN -->

<div id="intro">

ASTROVEDA

</div>

<!-- MAIN DASHBOARD -->

<div id="main">

<h1>ASTROVEDA</h1>

<div class="subtitle">
Ancient Vedic Astrology Platform
</div>

<div class="container">

<div class="box">Kundali</div>

<div class="box" id="luckybox">
Lucky Number: <span id="luckynumber"></span>
</div>

<div class="box">Daily Panchanga</div>

<div class="box">Transit (Gochara)</div>

<div class="box">Dasha Analysis</div>

<div class="box">Planet Positions</div>

</div>

</div>

<script>

/* ---------- INTRO TRANSITION ---------- */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="block"
},3000)

/* ---------- DAILY LUCKY NUMBER ---------- */

function luckyNumber(){

let today = new Date()

let sum =
today.getDate() +
(today.getMonth()+1) +
today.getFullYear()

while(sum > 9){
sum = sum.toString()
.split('')
.reduce((a,b)=>Number(a)+Number(b))
}

document.getElementById("luckynumber").innerText = sum

}

window.onload = luckyNumber

</script>

</body>
</html>
