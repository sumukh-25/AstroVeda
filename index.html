<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body{
margin:0;
background:#0B0F2F;
color:#F8F5E4;
font-family:"Cormorant Garamond",serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ===== WEBSITE BORDER FRAME ===== */

#frame{
width:92%;
height:92%;
border:2px solid #D4AF37;
box-shadow:0 0 25px rgba(212,175,55,0.6);
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

/* ===== SOLAR SYSTEM ===== */

#solar{
position:absolute;
width:500px;
height:500px;
display:flex;
justify-content:center;
align-items:center;
}

/* SUN */

.sun{
width:70px;
height:70px;
background:#D4AF37;
border-radius:50%;
box-shadow:0 0 40px gold;
position:absolute;
}

/* ORBITS */

.orbit{
position:absolute;
border:1px solid rgba(255,255,255,0.2);
border-radius:50%;
animation:spin linear infinite;
}

.orbit div{
width:10px;
height:10px;
background:white;
border-radius:50%;
position:absolute;
top:-5px;
left:50%;
transform:translateX(-50%);
filter:drop-shadow(0 0 6px gold);
}

/* DIFFERENT ORBITS */

.o1{width:120px;height:120px;animation-duration:8s}
.o2{width:160px;height:160px;animation-duration:12s}
.o3{width:200px;height:200px;animation-duration:16s}
.o4{width:240px;height:240px;animation-duration:20s}
.o5{width:280px;height:280px;animation-duration:24s}
.o6{width:320px;height:320px;animation-duration:28s}
.o7{width:360px;height:360px;animation-duration:32s}
.o8{width:400px;height:400px;animation-duration:36s}
.o9{width:440px;height:440px;animation-duration:40s}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* ===== CENTER LOGO ===== */

#logo{
position:absolute;
font-family:"Cinzel",serif;
font-size:48px;
color:#D4AF37;
text-shadow:0 0 20px gold;
}

/* ===== MAIN PAGE ===== */

#main{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

h1{
font-family:"Cinzel",serif;
font-size:42px;
color:#D4AF37;
margin-bottom:5px;
}

.subtitle{
font-size:18px;
opacity:0.85;
margin-bottom:40px;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:200px 200px 200px;
grid-template-rows:140px 140px 140px;
gap:25px;
}

/* ===== BOXES ===== */

.box{
background:#F5E6C8;
color:#0B0F2F;
border:2px solid #D4AF37;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-family:"Cinzel",serif;
font-size:20px;
cursor:pointer;
box-shadow:0 0 12px rgba(212,175,55,0.5);
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

/* POSITIONS */

.month{grid-column:1;grid-row:1;}
.panchanga{grid-column:3;grid-row:1;}

.kundali{grid-column:2;grid-row:2;}

.transit{grid-column:1;grid-row:3;}
.dasha{grid-column:3;grid-row:3;}

</style>
</head>

<body>

<div id="frame">

<!-- SOLAR SYSTEM INTRO -->

<div id="solar">

<div class="sun"></div>

<div class="orbit o1"><div></div></div>
<div class="orbit o2"><div></div></div>
<div class="orbit o3"><div></div></div>
<div class="orbit o4"><div></div></div>
<div class="orbit o5"><div></div></div>
<div class="orbit o6"><div></div></div>
<div class="orbit o7"><div></div></div>
<div class="orbit o8"><div></div></div>
<div class="orbit o9"><div></div></div>

</div>

<div id="logo">AstroVeda</div>

<!-- MAIN PAGE -->

<div id="main">

<h1>AstroVeda</h1>
<div class="subtitle">Vedic Astrology Platform</div>

<div class="grid">

<div class="box month">Month View</div>
<div class="box panchanga">Panchanga</div>

<div class="box kundali">Kundali</div>

<div class="box transit">Transit</div>
<div class="box dasha">Dasha</div>

</div>

</div>

</div>

<script>

/* intro duration */

setTimeout(()=>{
document.getElementById("solar").style.display="none"
document.getElementById("logo").style.display="none"
document.getElementById("main").style.display="flex"
},3000)

</script>

</body>
</html>
