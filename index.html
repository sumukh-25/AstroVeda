<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroVeda Intro</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#0b0b2a,#000);
font-family:serif;
color:white;
overflow:hidden;
}

/* Title */

.title{
position:absolute;
top:15%;
font-size:48px;
letter-spacing:4px;
color:gold;
text-shadow:0 0 20px gold;
}

/* Sun */

.sun{
width:120px;
height:120px;
background:radial-gradient(circle,orange,yellow);
border-radius:50%;
box-shadow:0 0 60px orange;
position:relative;
}

/* Orbit */

.orbit{
width:300px;
height:300px;
border:1px solid rgba(255,255,255,0.2);
border-radius:50%;
position:absolute;
display:flex;
justify-content:center;
align-items:flex-start;
animation:spin 12s linear infinite;
}

/* Navagraha dots */

.planet{
width:12px;
height:12px;
border-radius:50%;
background:white;
}

/* diyas */

.diya{
position:absolute;
bottom:40px;
font-size:42px;
animation:flicker 1.5s infinite;
}

.left{left:25%;}
.right{right:25%;}

/* bell */

.bell{
position:absolute;
top:30%;
font-size:50px;
animation:swing 2s infinite;
}

/* Animations */

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes flicker{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

@keyframes swing{
0%{transform:rotate(0deg);}
50%{transform:rotate(12deg);}
100%{transform:rotate(0deg);}
}

</style>
</head>

<body>

<div class="title">ASTROVEDA</div>

<div class="sun">
<div class="orbit">
<div class="planet"></div>
</div>
</div>

<div class="bell">🔔</div>

<div class="diya left">🪔</div>
<div class="diya right">🪔</div>

</body>
</html>
